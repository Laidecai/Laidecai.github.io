<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大爱仙尊 | 唯我独尊</title>
    <style>
        /* 仙尊暗黑风色彩体系 */
        :root {
            --bg-color: #0b0b0e;      /* 深邃夜色 */
            --text-color: #e2e8f0;    /* 冷白 */
            --accent-color: #991b1b;  /* 血月红 */
            --glow-color: #06b6d4;    /* 幽火青 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 核心展示卡片 */
        .container {
            max-width: 600px;
            width: 85%;
            text-align: center;
            padding: 50px 30px;
            border: 1px solid #1e293b;
            background: linear-gradient(145deg, #111827, #030712);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(153, 27, 27, 0.15);
            border-radius: 12px;
            position: relative;
        }

        /* 标题：睥睨天下 */
        h1 {
            font-size: 2.4rem;
            letter-spacing: 6px;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--text-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* 语录轮播区（打字机动态效果） */
        .quote-box {
            font-size: 1.25rem;
            line-height: 1.8;
            height: 70px; /* 固定高度防止页面抖动 */
            color: #cbd5e1;
            margin: 40px 0;
            font-weight: 300;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: var(--accent-color);
            animation: blink 0.7s infinite;
            margin-left: 3px;
        }

        /* 底部修行信息 */
        .footer {
            font-size: 0.85rem;
            color: #4b5563;
            margin-top: 60px;
            border-top: 1px solid #1e293b;
            padding-top: 20px;
        }

        .footer a {
            color: var(--glow-color);
            text-decoration: none;
            font-weight: bold;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>古月方源 · 个人真传</h1>
        <div class="subtitle">天若阻我，我便踏碎这天</div>
        
        <div class="quote-box">
            <span id="quote"></span><span class="cursor">&nbsp;</span>
        </div>

        <div class="footer">
            <p>「早岁已知世事艰，仍许飞雪满青山。」</p>
            <p>炼制人：<a href="#">大一修行者</a> | 宿命既定，唯我逆天</p>
        </div>
    </div>

    <script>
        // 仙尊经典语录库
        const quotes = [
            "难，才显真本事。易，要我何用？",
            "行于黑暗，留心光明。身在泥潭，心向巍峨。",
            "今朝暂且展羽翼，明载翱翔九重天！",
            "宿命……呵呵。千般谋划，万种牺牲，皆在此举！",
            "路在脚下，走便是了。"
        ];

        let quoteIndex = 0;
        let charIndex = 0;
        const quoteElement = document.getElementById("quote");

        function type() {
            if (charIndex < quotes[quoteIndex].length) {
                quoteElement.textContent += quotes[quoteIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 150); // 打字速度（毫秒）
            } else {
                setTimeout(erase, 3000); // 完整显示后停留3秒
            }
        }

        function erase() {
            if (charIndex > 0) {
                quoteElement.textContent = quotes[quoteIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 50); // 删除速度
            } else {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                setTimeout(type, 500); // 切换下一句的延迟
            }
        }

        // 页面加载完成后开始运行
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(type, 1000);
        });
    </script>
</body>
</html>
